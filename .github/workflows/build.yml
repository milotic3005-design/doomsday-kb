name: Build Installers

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-mac:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate macOS icon (icns)
        run: |
          mkdir -p resources
          # Create a simple icon using sips if icon.ico exists, otherwise use a placeholder
          if [ -f "resources/icon.ico" ]; then
            # Convert ICO → PNG → ICNS
            sips -s format png resources/icon.ico --out /tmp/icon.png 2>/dev/null || true
          fi
          # Fallback: create a minimal placeholder icon
          if [ ! -f "/tmp/icon.png" ]; then
            python3 -c "
          import struct, zlib
          def make_png(w, h, color):
              raw = b''.join(bytes([0] + [color[0], color[1], color[2], 255] * w) for _ in range(h))
              def chunk(t, d): c = zlib.crc32(t + d) & 0xffffffff; return struct.pack('>I', len(d)) + t + d + struct.pack('>I', c)
              return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)) + chunk(b'IDAT', zlib.compress(raw)) + chunk(b'IEND', b'')
          open('/tmp/icon.png','wb').write(make_png(512, 512, [255, 140, 0]))
          "
          fi
          # Build .icns from PNG
          mkdir -p /tmp/icon.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size /tmp/icon.png --out /tmp/icon.iconset/icon_${size}x${size}.png
            double=$((size * 2))
            sips -z $double $double /tmp/icon.png --out /tmp/icon.iconset/icon_${size}x${size}@2x.png
          done
          iconutil -c icns /tmp/icon.iconset -o resources/icon.icns
          echo "Icon created: $(ls -lh resources/icon.icns)"

      - name: Build Electron app
        run: npm run build

      - name: Package DMG (x64)
        run: npx electron-builder --mac --x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Package DMG (arm64)
        run: npx electron-builder --mac --arm64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List release artifacts
        run: ls -lh release/*.dmg

      - name: Upload DMG (x64 — Intel Mac)
        uses: actions/upload-artifact@v4
        with:
          name: doomsday-kb-mac-x64
          path: release/*x64*.dmg
          retention-days: 30

      - name: Upload DMG (arm64 — Apple Silicon)
        uses: actions/upload-artifact@v4
        with:
          name: doomsday-kb-mac-arm64
          path: release/*arm64*.dmg
          retention-days: 30

  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app
        run: npm run build

      - name: Package NSIS installer
        run: npx electron-builder --win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: doomsday-kb-windows-setup
          path: release/*.exe
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
