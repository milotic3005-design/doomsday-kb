appId: com.doomsdaykb.app
productName: Doomsday Knowledge Base
directories:
  output: release
  buildResources: resources
win:
  target: nsis
  icon: resources/icon.ico
  signAndEditExecutable: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: resources/icon.icns
  category: public.app-category.utilities
  darkModeSupport: true
dmg:
  title: "Doomsday Knowledge Base"
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
extraResources:
  - from: resources/ollama
    to: ollama
    filter:
      - "**/*"
  - from: knowledge-base
    to: knowledge-base
    filter:
      - "**/*"
files:
  - out/**/*
  - node_modules/**/*
  - package.json
  - "!node_modules/.cache/**"
  - "!node_modules/.bin/**"
  - "!node_modules/electron/**"
  - "!node_modules/@rollup/**"
  - "!node_modules/@vitejs/**"
  - "!node_modules/vite/**"
  - "!node_modules/electron-vite/**"
  - "!node_modules/electron-builder/**"
  - "!node_modules/typescript/**"
  - "!node_modules/tailwindcss/**"
  - "!node_modules/@tailwindcss/**"
  - "!node_modules/concurrently/**"
asar: true
asarUnpack:
  - "node_modules/@lancedb/**"
  - "node_modules/@napi-rs/canvas-darwin-x64/**"
  - "node_modules/@napi-rs/canvas-darwin-arm64/**"
  - "node_modules/@lancedb/lancedb-darwin-x64-gnu/**"
  - "node_modules/@lancedb/lancedb-darwin-arm64-gnu/**"
  - "node_modules/@lancedb/lancedb-win32-x64-msvc/**"
  - "node_modules/@napi-rs/canvas-win32-x64-msvc/**"
